# netlify.toml
# Configuración para desplegar correctamente una SPA en Netlify
# con Vite y React Router, y omitir el escaneo del valor de VITE_API_BASE

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_API_BASE"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
